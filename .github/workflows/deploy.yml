name: Deploy FastAPI to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Mengeksekusi perintah deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Masuk ke folder proyek menggunakan variabel PROJECT_PATH
            cd ${{ secrets.PROJECT_PATH }}
            
            # 2. Tarik kode terbaru dari GitHub
            git pull origin main
            
            # 3. Hentikan dan hapus container yang lama
            docker stop submeet-fastapi || true
            docker rm submeet-fastapi || true
            
            # 4. Build ulang image Docker dengan kode terbaru
            docker build -t submeet-classifier .
            
            # 5. Jalankan kembali container FastAPI
            docker run -d \
              --name submeet-fastapi \
              --env-file .env \
              -p 8001:8001 \
              --restart unless-stopped \
              submeet-classifier